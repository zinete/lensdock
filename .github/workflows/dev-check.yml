name: Development Check

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

jobs:
  quick-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify dependencies
        run: npm list

      - name: Check package.json and forge.config.js
        run: |
          echo "=== package.json ==="
          node -e "const pkg = require('./package.json'); console.log('Main:', pkg.main); console.log('Scripts:', Object.keys(pkg.scripts));"
          echo ""
          echo "=== forge.config.js ==="
          node -e "const config = require('./forge.config.js'); console.log('Makers:', config.makers.map(m => m.name)); console.log('Plugins:', config.plugins.map(p => p.name || p.constructor.name));"
